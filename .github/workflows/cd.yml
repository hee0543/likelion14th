name: CD

on:
  workflow_run:  #채우기
    workflows: ["CI with Gradle"] #ci.yml의 작업이름
    types: [completed] #CI가 완료되었을때~ (즉 CD 작업 전에 필연적으로 CI 작업이 이루어져야 함)
    branches: [main]


permissions:
  contents: read

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/likelion #[소문자로 시작하는 프로젝트명]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SSH로 서버에 접속해 배포
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.ENV_FILE }}" > /home/${{ secrets.SERVER_USER }}/.env
            echo "[1/3] Pull latest Docker image..."
            docker pull ${{ env.IMAGE }}:latest

            echo "[2/3] Restart container with new image..."
            docker stop likelion || true
            docker rm likelion || true
            docker run -d --name likelion \
              --env-file /home/${{ secrets.SERVER_USER }}/.env \
              -p 8080:8080 \
              ${{ env.IMAGE }}:latest
            
            
            echo "[3/3] Cleanup unused images..."
            docker image prune -f
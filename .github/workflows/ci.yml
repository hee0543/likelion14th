name: CI with Gradle


on: #채우기
  pull_request:
    branches: ["main"] # 특정 브랜치에 PR 이벤트 발생 시 (열림/수정/리오픈 등) CI 실행
  push:
    branches: ["main"] # 특정 브랜치로 직접 push될 때도 CI 실행
  workflow_dispatch: # 깃허브의 Actions 탭에서 수동 실행 버튼 제공 (필요할 때 수동으로 돌릴 수 있게)



# 같은 브랜치에서 중복 실행되면 이전 빌드 취소(리소스 절약/레이스 방지)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # 코드 읽기 권한


env: # 채우기
  JAVA_VERSION: '21'
  IMAGE: ${{secrets.DOCKER_USERNAME }}/likelion

jobs:
  build: # 1) 빌드 전용 Job — PR과 push 모두 실행
    name: build
    runs-on: ubuntu-latest #기본 ubuntu 서버를 쓸것임

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew   # gradlew 실행 권한 부여(권한 문제 예방)

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon # 테스트 건너뛰고 배포용 JAR 빌드

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4 # 아티팩트로 업로드; 도커 이미지를 만들기 위해 '공유 상자' 개념인 아티팩드로 업로드함.
        with:
          name: app-jar
          path: build/libs/*.jar

  docker-push: # 2) Docker 이미지 빌드/푸시 Job — PR에서는 실행 X
    name: Docker Build & Push
    # 조건: PR 이벤트가 아니고 && 대상 브랜치가 main일 때만 이미지 푸시
    # 채우기
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build #첫번째 일이 완료되면 (두번째 일을 실행하도록 명령~)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact # build에서 맞는 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Docker Hub 로그인
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: . # 현재 디렉토리를 빌드 컨텍스트로 사용
          push: true # 빌드한 이미지를 Docker Hub에 푸시
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}